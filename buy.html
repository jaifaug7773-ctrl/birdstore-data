<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout | Bird Net Solutions</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    [x-cloak] { display: none !important; }
    @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .animate-success { animation: popIn 0.3s ease-out forwards; }
</style>
</head>
<body x-data="buyApp()" x-init="init()" class="bg-[#F8FAFC]">

<nav class="max-w-5xl mx-auto p-6 flex items-center justify-between">
    <button @click="window.location.href='index.html'" class="text-[10px] font-black tracking-widest uppercase text-slate-400 hover:text-black transition">← Back to Shop</button>
    <h1 class="text-sm font-black uppercase tracking-tighter italic">Bird Net <span class="text-blue-600">Solutions</span></h1>
    <div class="w-10"></div>
</nav>

<main class="max-w-5xl mx-auto px-4 py-4 md:flex gap-12">
    <div class="w-full md:w-1/2 mb-8 md:mb-0">
        <div class="bg-white p-4 rounded-[32px] shadow-sm border border-slate-100 sticky top-24">
            <div class="aspect-square bg-slate-50 rounded-[24px] overflow-hidden mb-6 flex items-center justify-center">
                <img :src="mainImg" class="max-h-full object-contain p-6 drop-shadow-2xl">
            </div>
            <h2 class="text-2xl md:text-3xl font-black tracking-tighter text-slate-800" x-text="product.name"></h2>
            <p class="text-3xl text-blue-600 font-black mt-2">₹<span x-text="product.price"></span></p>
        </div>
    </div>

    <div class="flex-1 space-y-6">
        <div class="bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm">
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Quantity</label>
                    <input type="number" x-model="quantity" min="1" class="w-full mt-2 bg-slate-50 border-none rounded-2xl p-4 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Payment Method</label>
                    <div class="mt-2 p-4 bg-slate-50 rounded-2xl border-2 border-blue-500 flex justify-between items-center">
                        <span class="font-bold text-sm text-slate-700">Cash on Delivery</span>
                        <span class="text-blue-500 text-lg">✓</span>
                    </div>
                </div>
            </div>

            <button @click="showModal = true" class="w-full mt-8 bg-blue-600 text-white py-5 rounded-[20px] font-black uppercase text-xs tracking-[0.2em] shadow-xl shadow-blue-100 hover:scale-[1.02] active:scale-95 transition-all">
                Proceed to Checkout
            </button>
        </div>
    </div>
</main>

<div x-show="showModal" x-cloak class="fixed inset-0 z-[100] flex items-end md:items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
    <div @click.away="if(!submitted) showModal = false" class="bg-white w-full max-w-lg rounded-t-[32px] md:rounded-[32px] p-6 md:p-10 shadow-2xl animate-success overflow-y-auto max-h-[90vh]">
        <div x-show="!submitted">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-black uppercase tracking-tighter italic text-slate-800">Delivery <span class="text-blue-600">Details</span></h3>
                <button @click="showModal = false" class="text-slate-300 hover:text-black">✕</button>
            </div>
            
            <form @submit.prevent="submitToWeb3" class="space-y-4">
                <input type="hidden" name="access_key" value="40522e55-9cf4-4ee7-8a73-5db74b774611">
                <input type="hidden" name="Order_Item" :value="product.name">
                <input type="hidden" name="Total_Bill" :value="product.price * quantity">

                <input type="text" name="name" required placeholder="Full Name" class="w-full bg-slate-50 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <input type="tel" name="phone" required placeholder="Phone Number" class="w-full bg-slate-50 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <textarea name="address" required placeholder="Full Address" rows="3" class="w-full bg-slate-50 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500 transition-all"></textarea>

                <button type="submit" :disabled="loading" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest mt-4">
                    <span x-text="loading ? 'Processing...' : 'Confirm My Order'"></span>
                </button>
            </form>
        </div>

        <div x-show="submitted" class="text-center py-10">
            <div class="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-6">✓</div>
            <h2 class="text-3xl font-black tracking-tighter mb-2 italic uppercase">Order Placed!</h2>
            <p class="text-slate-400 text-sm mb-10">We will call you shortly to confirm.</p>
            <button @click="window.location.href='index.html'" class="bg-black text-white px-10 py-4 rounded-2xl font-bold uppercase text-[10px]">Back to Home</button>
        </div>
    </div>
</div>

<script>
// GITHUB CONNECTION INCLUDED
const USER='jaifaug7773-ctrl', REPO='birdstore-data', FILE='products.json';
function buyApp(){
    return {
        product: { name:'Loading...', price:0 }, mainImg: '', quantity: 1, showModal: false, loading: false, submitted: false,
        init(){
            const name = new URLSearchParams(window.location.search).get('name');
            fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FILE}?v=${Date.now()}`)
                .then(r=>r.json()).then(d=>{
                    const items = JSON.parse(decodeURIComponent(escape(atob(d.content))));
                    const prod = items.find(p=>p.name === name) || items[0];
                    this.product = prod;
                    this.mainImg = prod.img;
                });
        },
        async submitToWeb3(e) {
            this.loading = true;
            try {
                const res = await fetch("https://api.web3forms.com/submit", { method: "POST", body: new FormData(e.target) });
                if (res.ok) this.submitted = true;
            } catch (err) { alert("Error"); } finally { this.loading = false; }
        }
    }
}
</script>
</body>
</html>
